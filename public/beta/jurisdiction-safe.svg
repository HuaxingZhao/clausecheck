<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" role="img" aria-label="Multi-jurisdiction RAG isolation">
  <rect width="800" height="480" fill="#F8F6F1"/>
  <rect x="40" y="40" width="720" height="400" rx="16" fill="#fff" stroke="#E5E0D8"/>
  <text x="64" y="88" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#1A365D">Jurisdiction Pack isolation</text>
  <text x="64" y="118" font-family="system-ui,sans-serif" font-size="13" fill="#6B6560">Only one Pack loads per review - RAG filtered by metadata</text>
  <rect x="80" y="170" width="200" height="160" rx="12" fill="#EFF6FF" stroke="#1D4ED8"/>
  <text x="180" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1E3A8A">Base</text>
  <text x="180" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#1E40AF">shared rules</text>
  <rect x="300" y="210" width="40" height="8" fill="#94A3B8"/>
  <rect x="360" y="170" width="200" height="160" rx="12" fill="#ECFDF5" stroke="#059669"/>
  <text x="460" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#065F46">us-ca Pack</text>
  <text x="460" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#047857">active only</text>
  <rect x="580" y="170" width="140" height="160" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="6 4"/>
  <text x="650" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94A3B8">cn Pack</text>
  <text x="650" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">not loaded</text>
  <text x="64" y="400" font-family="system-ui,sans-serif" font-size="12" fill="#9A948C">No cross-jurisdiction statute leakage</text>
</svg>
